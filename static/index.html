<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autoresearch Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◆</span>
      <div>
        <h1>Autoresearch Agent</h1>
        <p class="subtitle">Autonomous model search &amp; selection</p>
      </div>
    </div>
    <div class="controls">
      <span id="status-badge" class="badge idle">idle</span>
      <input id="max-runs" type="number" min="1" placeholder="∞ runs" title="Max runs (blank = forever)" />
      <button id="btn-start" class="btn primary">Start</button>
      <button id="btn-stop" class="btn" disabled>Stop</button>
      <button id="btn-restore" class="btn" title="Write the best config back to train.py">Switch to best</button>
    </div>
  </header>

  <main>
    <p id="message" class="message">Connecting…</p>

    <!-- Workflow pipeline -->
    <section class="card">
      <h2>Workflow</h2>
      <div id="pipeline" class="pipeline"></div>
    </section>

    <div class="grid">
      <!-- Live training panel -->
      <section class="card">
        <h2>Current experiment</h2>
        <div id="current-meta" class="meta">No experiment running.</div>
        <div class="progress-wrap">
          <div id="progress-bar" class="progress-bar"></div>
          <span id="progress-label" class="progress-label">0%</span>
        </div>
        <div id="live-stats" class="stats"></div>
      </section>

      <!-- Best model panel -->
      <section class="card best">
        <h2>Best model</h2>
        <div id="best-panel" class="best-panel">No results yet.</div>
      </section>
    </div>

    <!-- val_bpb chart -->
    <section class="card">
      <h2>val_bpb over runs <span class="hint">(lower is better)</span></h2>
      <canvas id="chart" height="220"></canvas>
    </section>

    <!-- History table -->
    <section class="card">
      <h2>History</h2>
      <div class="table-wrap">
        <table id="history">
          <thead>
            <tr>
              <th>#</th><th>Variant</th><th>val_bpb</th>
              <th>VRAM (MB)</th><th>Status</th><th>Note</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- Log tail -->
    <section class="card">
      <h2>Log</h2>
      <pre id="log" class="log"></pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
